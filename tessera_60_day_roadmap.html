        "By Week 7 you should have 2–3 corporate meetings completed. Push for pilot proposal this week.",
        "Send a formal pilot proposal document: 10 employees, 90 days, before/after biological age scores for the whole group, ₹6,000/person/month (discounted pilot rate).",
        "Continue DM outreach — you should now be getting inbound from LinkedIn content. Track inbound vs outbound ratio.",
        "Hire or contract first part-time health coach if client load exceeds 15 active clients.",
        "Doctor advisor: schedule a monthly review call to discuss any edge cases from the first cohort."
      ]},
      {name:"Content — weeks 7–8", color:"#854F0B", tasks:[
        "LinkedIn #16–18: Day-90 case study reveal. 3-part series: Part 1 'We re-tested everything.' Part 2 'The biomarker that moved the most.' Part 3 'What a 4.7-year biological age reduction actually looks like.'",
        "LinkedIn #19–21: Shift to deeper science — 'The AMPK pathway: why Zone 2 cardio is longevity's most important mechanism.' Show you know the science, not just the protocol.",
        "Instagram: Full Reel of the Day-90 reveal process — anonymized but showing the actual bloodwork comparison sheet. This video will perform very well.",
        "Blog #5: 'Our first 90-day results: what actually moved, what didn't, and what we learned'",
        "Paper #2: Draft Section 1 and 2. This paper has real before/after data now — much stronger than the first."
      ]}
    ],
    daily:[
      {time:"7–8am", task:"Content creation", sub:"Now batching 3 at once"},
      {time:"9–10am", task:"Client check-ins", sub:"15+ clients in system"},
      {time:"10am–1pm", task:"New consultations", sub:"Inbound leads from content"},
      {time:"2–4pm", task:"Study + research paper", sub:"Deep work block"},
      {time:"4–5pm", task:"Corporate follow-ups", sub:"Pilot proposal discussions"}
    ],
    callout:{type:"cg", text:"<strong>Where you should be at Day 60:</strong> 15–20 paying clients enrolled across 3 tiers. 1 complete case study with real before/after biological age data. 1 preprint paper published with DOI. 21+ LinkedIn posts. 18+ Instagram posts. 5 blog posts. 2–3 corporate meetings done, 1 pilot proposal sent. 1–2 media pitches getting responses. ₹3–6L in revenue. And a very clear picture of exactly what to do in Month 3."}
  }
];

const nav = document.getElementById('weeknav');
const container = document.getElementById('week-container');

WEEKS.forEach((w,i) => {
  const btn = document.createElement('button');
  btn.className = 'wbtn' + (i===0?' on':'');
  btn.textContent = w.num + ' — ' + w.days;
  btn.onclick = () => {
    document.querySelectorAll('.wbtn').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.week-view').forEach(v=>v.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('wv'+i).classList.add('on');
  };
  nav.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'week-view' + (i===0?' on':'');
  div.id = 'wv'+i;

  let trackHTML = w.tracks.map(t => `
    <div class="track">
      <div class="track-head">
        <div class="track-icon" style="background:${t.color}"></div>
        <div class="track-name">${t.name}</div>
      </div>
      <div class="track-body">
        ${t.tasks.map(task => `
          <div class="task">
            <div class="task-check" onclick="toggleTask(this)"></div>
            <div class="task-text" onclick="toggleTask(this.previousElementSibling)">${task}</div>
          </div>`).join('')}
      </div>
    </div>`).join('');

  let dailyHTML = '';
  if(w.daily) {
    dailyHTML = `<div class="daily-box">
      <div class="daily-title">Daily schedule — this week</div>
      <div class="daily-grid">
        ${w.daily.map(d=>`<div class="daily-item">
          <div class="di-time">${d.time}</div>
          <div class="di-task">${d.task}</div>
          <div class="di-sub">${d.sub}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  div.innerHTML = `
    <div class="week-header">
      <div class="wh-top">
        <div>
          <div class="wh-num">${w.num} · ${w.days}</div>
          <div class="wh-title">${w.title}</div>
          <div class="wh-sub">${w.sub}</div>
        </div>
        <div class="wh-focus">
          <div class="focus-label">Focus</div>
          <div class="focus-pill" style="background:${w.focusColor};color:${w.focusTxt}">${w.focus}</div>
        </div>
      </div>
    </div>
    <div class="tracks">${trackHTML}</div>
    ${dailyHTML}
    <div class="callout ${w.callout.type}">${w.callout.text}</div>`;

  container.appendChild(div);
});

function toggleTask(check) {
  check.classList.toggle('done');
  const text = check.nextElementSibling || check;
  if(text.classList.contains('task-text')) text.classList.toggle('done');
  if(check.classList.contains('task-text')) {
    const c = check.previousElementSibling;
    if(c && c.classList.contains('task-check')) c.classList.toggle('done');
  }
}
</script>
